[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
board_upload.flash_size = 16MB              ; 16MB Flash
board_build.arduino.memory_type = qio_opi   ; Flash(QIO) + PSRAM(OPI)
board_build.psram_type = opi                ; 8MB PSRAM 是 OPI 模式
build_flags = -DBOARD_HAS_PSRAM             ; 启用 PSRAM 宏
board_build.partitions = default_16MB.csv   ; 16MB 分区表
upload_speed = 500000
monitor_speed = 115200
debug_tool = esp-builtin
debug_init_break = break setup
build_type = debug
lib_deps =